apiVersion: v1
kind: ConfigMap
metadata:
  name: obelisk-config
  namespace: obelisk
data:
  API_HOST: "0.0.0.0"
  API_PORT: "8000"
  DEBUG: "false"
  JWT_ALGORITHM: "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES: "60"
  AUTH_USERNAME: "admin"
  CORS_ORIGINS: "https://obelisk.local"
  SECURE_COOKIES: "true"
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "obelisk"
  POSTGRES_USER: "obelisk"
  NEO4J_URI: "bolt://neo4j:7687"
  NEO4J_USER: "neo4j"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  NPM_REGISTRY_URL: "https://registry.npmjs.org"
  PYPI_REGISTRY_URL: "https://pypi.org/pypi"
  SANDBOX_TIMEOUT: "30"
  SANDBOX_MEMORY_LIMIT: "512m"
