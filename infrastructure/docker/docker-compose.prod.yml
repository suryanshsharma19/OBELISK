version: "3.9"

services:
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: obelisk-nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  backend:
    image: ghcr.io/obelisk/backend:1.0.0
    container_name: obelisk-backend
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 8000
      DEBUG: "false"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: obelisk
      POSTGRES_USER: obelisk
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SECRET_KEY: ${SECRET_KEY}
      AUTH_USERNAME: ${AUTH_USERNAME}
      AUTH_PASSWORD: ${AUTH_PASSWORD}
      SECURE_COOKIES: "true"
      CORS_ORIGINS: ${CORS_ORIGINS:-https://obelisk.local}
    depends_on:
      - postgres
      - neo4j
      - redis
    restart: unless-stopped

  worker:
    image: ghcr.io/obelisk/backend:1.0.0
    container_name: obelisk-worker
    command: ["celery", "-A", "app.workers.celery_app:celery_app", "worker", "-l", "info"]
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 8000
      DEBUG: "false"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: obelisk
      POSTGRES_USER: obelisk
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SECRET_KEY: ${SECRET_KEY}
      AUTH_USERNAME: ${AUTH_USERNAME}
      AUTH_PASSWORD: ${AUTH_PASSWORD}
    depends_on:
      - backend
    restart: unless-stopped

  frontend:
    image: ghcr.io/obelisk/frontend:1.0.0
    container_name: obelisk-frontend
    environment:
      REACT_APP_API_URL: ${PUBLIC_API_URL}
      REACT_APP_WS_URL: ${PUBLIC_WS_URL}
      REACT_APP_AUTH_USERNAME: ${AUTH_USERNAME}
      REACT_APP_AUTH_PASSWORD: ${AUTH_PASSWORD}
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: obelisk-postgres
    environment:
      POSTGRES_DB: obelisk
      POSTGRES_USER: obelisk
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  neo4j:
    image: neo4j:5.15-community
    container_name: obelisk-neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
    volumes:
      - neo4j_data:/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: obelisk-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  neo4j_data:
  redis_data:
