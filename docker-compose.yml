version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: obelisk-postgres
    environment:
      POSTGRES_DB: obelisk
      POSTGRES_USER: obelisk
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U obelisk"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.15-community
    container_name: obelisk-neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-change_me}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-change_me}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: obelisk-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: obelisk-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://obelisk:${POSTGRES_PASSWORD:-change_me}@postgres:5432/obelisk
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-change_me}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SECRET_KEY: ${SECRET_KEY:-replace_me}
      AUTH_USERNAME: ${AUTH_USERNAME:-admin}
      AUTH_PASSWORD: ${AUTH_PASSWORD:-change_me}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      SANDBOX_ENABLED: ${SANDBOX_ENABLED:-true}
      SANDBOX_ALLOW_DOCKER: ${SANDBOX_ALLOW_DOCKER:-true}
      RISK_DISABLE_CALIBRATION: ${RISK_DISABLE_CALIBRATION:-false}
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /usr/bin/docker:/usr/local/bin/docker:ro
      - /var/run/docker.sock:/var/run/docker.sock
    user: "0:0"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: obelisk-frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8000
      REACT_APP_WS_URL: ws://localhost:8000/ws
      REACT_APP_AUTH_USERNAME: ${AUTH_USERNAME:-admin}
      REACT_APP_AUTH_PASSWORD: ${AUTH_PASSWORD:-change_me}
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    user: "0:0"
    stdin_open: true
    tty: true

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  redis_data:
