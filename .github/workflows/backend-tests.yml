name: Backend Tests
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: obelisk
          POSTGRES_USER: obelisk
          POSTGRES_PASSWORD: obelisk
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U obelisk -d obelisk"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      neo4j:
        image: neo4j:5.15-community
        env:
          NEO4J_AUTH: neo4j/obelisk_ci_neo4j_2026
        ports:
          - 7474:7474
          - 7687:7687
        options: >-
          --health-cmd "cypher-shell -u neo4j -p obelisk_ci_neo4j_2026 'RETURN 1' || exit 1"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 20
    env:
      ENVIRONMENT: production
      DATABASE_URL: postgresql://obelisk:obelisk@127.0.0.1:5432/obelisk
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      POSTGRES_DB: obelisk
      POSTGRES_USER: obelisk
      POSTGRES_PASSWORD: obelisk
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      NEO4J_URI: bolt://127.0.0.1:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: obelisk_ci_neo4j_2026
      SECRET_KEY: CI_BACKEND_SECRET_KEY_2026_SUPER_LONG_VALUE_1234567890
      AUTH_USERNAME: admin
      AUTH_PASSWORD: CI_Backend_StrongPass_2026!
      CORS_ORIGINS: https://obelisk.example.com
      SECURE_COOKIES: "true"
      ALLOW_LOCALHOST_CORS_IN_NON_LOCAL: "false"
      ENFORCE_STRONG_SECRETS: "true"
      ENABLE_STARTUP_READINESS_CHECKS: "true"
      STARTUP_CHECK_DEPENDENCIES: "false"
      STRICT_STARTUP_CHECKS: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r backend/requirements-dev.txt
      - name: Enforce runtime security baseline (hard gate)
        run: cd backend && python scripts/verify_runtime_security.py --strict --require-non-local
      - name: Evaluate startup readiness (informational in CI)
        run: cd backend && python scripts/check_startup_readiness.py --include-dependencies --no-require-ready
      - name: Run backend tests (coverage hard gate)
        run: cd backend && pytest
      - name: Critical endpoint smoke checks (hard gate)
        run: cd backend && python scripts/smoke_endpoints.py
      - name: Enforce analyze latency SLO (e2e hard gate)
        run: cd backend && python scripts/benchmark_analyze.py --mode e2e --samples 30 --warmup 8 --enforce-under-ms 1000
